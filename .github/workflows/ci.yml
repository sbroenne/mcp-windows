name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.sln'
      - 'Directory.Packages.props'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release-unified.yml'
      - '.github/workflows/llm-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.sln'
      - 'Directory.Packages.props'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release-unified.yml'
      - '.github/workflows/llm-tests.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Least privilege: CI only needs to read the repository contents.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run Tests
      run: dotnet test --no-build --configuration Release --filter "Category!=RequiresDesktop&Category!=RequiresDisplay" --verbosity normal

    # Coverage runs in Debug so PDBs are available for coverlet instrumentation
    # (Release strips symbols via DebugType=none). Scoped to the deterministic Unit
    # subset so hosted CI stays fast and flake-free; the Release run above is the full gate.
    - name: Collect Code Coverage
      run: >
        dotnet test tests/Sbroenne.WindowsMcp.Tests/Sbroenne.WindowsMcp.Tests.csproj
        --configuration Debug
        --filter "FullyQualifiedName~Unit"
        --collect:"XPlat Code Coverage"
        --settings .runsettings
        --results-directory TestResults
        --verbosity minimal

    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: code-coverage
        path: TestResults/**/coverage.cobertura.xml
        retention-days: 14
        if-no-files-found: warn
